- type: body
  id: ProtoMoth
  name: proto-moth # Starlight, quotation marks removed
  root: chest
  slots:
    head:
      part: HeadMoth
      connections:
      - chest
      organs:
        brain: OrganProtogenBrain
        eyes: OrganProtogenEyes
        tongue: OrganProtogenTongue
    chest:
      part: ChestMoth
      connections:
      - right arm
      - left arm
      - head
      - groin
      organs:
        heart: OrganProtogenHeart
        lungs: OrganProtogenLungs
    groin:
      part: GroinMoth
      connections:
      - right leg
      - left leg
      organs:
        stomach: OrganProtoMothStomach # Can eat everything.
        liver: OrganProtogenLiver
        kidneys: OrganProtogenKidneys
    right arm:
      part: RightArmMoth
      connections:
      - right hand
    left arm:
      part: LeftArmMoth
      connections:
      - left hand
    right hand:
      part: RightHandMoth
    left hand:
      part: LeftHandMoth
    right leg:
      part: RightLegMoth
      connections:
      - right foot
    left leg:
      part: LeftLegMoth
      connections:
      - left foot
    right foot:
      part: RightFootMoth
    left foot:
      part: LeftFootMoth
