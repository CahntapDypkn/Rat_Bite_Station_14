- type: body
  id: ProtoArachnid
  name: proto-arachnid # Starlight, quotation marks removed
  root: chest
  slots:
    head:
      part: HeadArachnid
      connections:
      - chest
      organs:
        brain: OrganProtogenBrain
        eyes: OrganProtogenEyes
        tongue: OrganProtogenTongue
    chest:
      part: ChestArachnid
      connections:
      - right arm
      - left arm
      - head
      - groin
      organs:
        heart: OrganProtoArachnidHeart
        lungs: OrganProtogenLungs
    groin:
      part: GroinArachnid
      connections:
      - right leg
      - left leg
      organs:
        stomach: OrganProtogenStomach
        liver: OrganProtogenLiver
        kidneys: OrganProtogenKidneys
    right arm:
      part: RightArmArachnid
      connections:
      - right hand
    left arm:
      part: LeftArmArachnid
      connections:
      - left hand
    right hand:
      part: RightHandArachnid
    left hand:
      part: LeftHandArachnid
    right leg:
      part: RightLegArachnid
      connections:
      - right foot
    left leg:
      part: LeftLegArachnid
      connections:
      - left foot
    right foot:
      part: RightFootArachnid
    left foot:
      part: LeftFootArachnid
