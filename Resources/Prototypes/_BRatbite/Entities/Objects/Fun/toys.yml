- type: entity
  parent: BaseTalkingPlushie
  id: PlushieCarmella #Made by ColonelNothing for Splatt
  name: Carmella Plushie
  description: A handmade plushie of Carmella Dot, Nanotrasens best CCO.
  components:
  - type: Sprite
    sprite: _BRatBites/Objects/Fun/Plushies/carmellaplush.rsi
    state: icon
  - type: Item
    sprite: _BRatBites/Objects/Fun/Plushies/carmellaplush.rsi
    inhandVisuals:
      left:
      - state: inhand-left
        shader: shaded
      right:
      - state: inhand-right
        shader: shaded
  - type: SpeakOnTrigger
    pack: PlushiesCarmellaDot
  - type: Speech
    speechSounds: Squeak
  - type: EmitSoundOnLand
    sound:
      path: /Audio/Voice/Human/femalescream_3.ogg
  - type: EmitSoundOnCollide
    sound:
      path: /Audio/Voice/Human/femalescream_3.ogg
  - type: Food
    requiresSpecialDigestion: true
    useSound:
      path: /Audio/Voice/Human/femalescream_3.ogg
  - type: MeleeWeapon
    wideAnimationRotation: 180
    soundHit:
      path: /Audio/Animals/mouse_squeak.ogg
  - type: Clothing
    clothingVisuals:
      head:
      - state: equipped-HELMET
        shader: shaded
        offset: "0, 0.12"
    quickEquip: false
    sprite: _BRatBites/Objects/Fun/Plushies/carmellaplush.rsi
    slots:
    - HEAD
#  - type: FoodSequenceElement
#    entries:
#      CottonBurger: ExperimentPlushie
  - type: Tag
    tags:
    - Payload
    - ClothMade

