- type: reagent
  id: Ketamine
  name: reagent-name-ketamine
  group: Narcotics
  desc: reagent-desc-ketamine
  physicalDesc: reagent-physical-desc-milky
  flavor: bitter
  color: "#f7a3c6"
  metabolisms:
    Narcotic:
      metabolismRate: 0.2
      effects:
      - !type:GenericStatusEffect
        key: KetamineSlurredSpeech
        component: KetamineSlurredAccent
        conditions:
        - !type:ReagentThreshold
          reagent: Charcoal
          max: 9.99
        time: 60
        refresh: false
      - !type:ModifyStatusEffect
        effectProto: StatusEffectSeeingRainbow
        time: 16
        type: Add
        refresh: true
        conditions:
        - !type:ReagentThreshold
          reagent: Charcoal
          max: 9.99
      - !type:Drunk
        boozePower: 3
        conditions:
        - !type:ReagentThreshold
          reagent: Charcoal
          max: 9.99
      - !type:MovespeedModifier
        walkSpeedModifier: 0.5
        sprintSpeedModifier: 0.5
        conditions:
        - !type:ReagentThreshold
          reagent: Charcoal
          max: 9.99
      - !type:HealthChange
        conditions:
        - !type:ReagentThreshold
          reagent: Ketamine
          min: 15
        - !type:ReagentThreshold
          reagent: Charcoal
          max: 9.99
        damage:
          types:
            Cellular: 0.2
      - !type:GenericStatusEffect
        key: KetamineSedation
        component: KetamineSedation
        conditions:
        - !type:ReagentThreshold
          reagent: Charcoal
          max: 9.99
        time: 60
        refresh: false
      - !type:GenericStatusEffect
        key: KetamineSedation
        conditions:
        - !type:ReagentThreshold
          reagent: Charcoal
          min: 10
        time: 300
        type: Remove
      - !type:GenericStatusEffect
        key: KetamineSlurredSpeech
        conditions:
        - !type:ReagentThreshold
          reagent: Charcoal
          min: 10
        time: 300
        type: Remove

