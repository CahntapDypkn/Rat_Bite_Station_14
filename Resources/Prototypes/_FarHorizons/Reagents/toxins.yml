- type: reagent
  id: BatteryAcid
  name: reagent-name-batteryacid
  group: Toxins
  desc: reagent-desc-batteryacid
  physicalDesc: reagent-physical-desc-metallic
  contrabandSeverity: Minor
  flavor: shocking
  color: "#ffe270"
  metabolisms:
    Poison:
      effects:
      - !type:HealthChange
        conditions:
        - !type:OrganType
          type: Protogen # Harmless to protogens
          shouldHave: false
        damage:
          types: # Drinking battery acid is bad for you? Woh.
            Shock: 0.5
            Caustic: 0.5
      - !type:SatiateThirst
        conditions:
        - !type:OrganType
          type: Protogen
        factor: 1 #yummy
    Medicine: #Acts like vitamin but for protogens. Keep in mind the -50% healing debuff they get, hence buffed numbers.
      effects:
      - !type:HealthChange
        conditions:
        - !type:OrganType
          type: Protogen
        damage:
          groups:
            Brute: -1
            Burn: -1
      - !type:ModifyBleedAmount #smth smth burns you from the inside so it stops internal bleeding, clearly.
        amount: -0.5
      - !type:SatiateHunger
        conditions:
        - !type:OrganType
          type: Protogen
